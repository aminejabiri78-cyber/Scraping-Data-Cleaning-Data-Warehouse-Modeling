version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  selenium:
    image: selenium/standalone-chrome:4.20.0
    container_name: selenium
    restart: always
    ports:
      - "4444:4444"

  app:
    build: .
    container_name: etl_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_started
    environment:
      USER: postgres
      PASS: postgres
      HOST: db
      PORT: 5432
      DB_NAME: etl_db
      SELENIUM_URL: http://selenium:4444/wd/hub
    volumes:
      - .:/app
    command: python main.py

volumes:
  postgres_data: